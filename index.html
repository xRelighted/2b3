<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>relighted / data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0e;
            color: #e5e5e5;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Fondo con textura de papel japones y luz difusa */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(180, 180, 200, 0.02) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(0, 255, 200, 0.02) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.003) 0px, rgba(255,255,255,0.003) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Partículas muy tenues */
        .particle-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0,255,200,0.2);
            animation: drift 40s infinite linear;
        }

        @keyframes drift {
            from { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            to { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        /* Contenedor principal con scroll suave */
        .scene {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Elementos japoneses flotantes */
        .japanese-char {
            position: absolute;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255,255,255,0.02);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            animation: floatKanji 30s infinite alternate ease-in-out;
        }

        @keyframes floatKanji {
            from { transform: translateY(-5%) translateX(-2%) rotate(-1deg); }
            to { transform: translateY(5%) translateX(2%) rotate(1deg); }
        }

        /* Header flotante con minimalismo extremo */
        .header-zone {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        .name {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #f0f0f0;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0,255,200,0.1);
            animation: breathe 6s infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .kanji-sub {
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 0.5em;
            margin-bottom: 3rem;
        }

        .discord-link {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            padding: 0.8rem 2.5rem;
            border-radius: 40px;
            color: #fff;
            text-decoration: none;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .discord-link:hover {
            border-color: #00ffc8;
            background: rgba(0,255,200,0.1);
            box-shadow: 0 0 30px rgba(0,255,200,0.2);
        }

        /* Zona de videos: collage asimétrico */
        .video-collage {
            min-height: 100vh;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 4rem 0;
            position: relative;
        }

        .video-mask {
            width: 300px;
            height: 180px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.5);
            position: relative;
            filter: grayscale(30%);
        }

        .video-mask:nth-child(2) {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            width: 350px;
            height: 200px;
            margin-top: -50px;
        }

        .video-mask:nth-child(3) {
            border-radius: 40% 60% 70% 30% / 40% 50% 50% 60%;
            width: 280px;
            height: 190px;
            margin-bottom: -30px;
        }

        .video-mask:hover {
            border-radius: 50%;
            transform: scale(1.05) rotate(2deg);
            filter: grayscale(0%);
            box-shadow: 0 0 0 2px #00ffc8, 0 30px 40px -15px #00ffc8;
        }

        .video-mask iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            pointer-events: none;
        }

        .video-mask a {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-mask:hover .video-label {
            opacity: 1;
        }

        /* Sección de precios como haikus visuales */
        .pricing-haiku {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4rem;
        }

        .haiku-card {
            display: flex;
            gap: 2rem;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 100px;
            padding: 1rem 2rem;
            width: fit-content;
            transition: 0.3s;
        }

        .haiku-card:hover {
            border-color: #00ffc8;
            background: rgba(0,255,200,0.05);
        }

        .haiku-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem;
            border-right: 1px dashed #333;
        }

        .haiku-item:last-child {
            border-right: none;
        }

        .haiku-desc {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 300;
            white-space: nowrap;
        }

        .haiku-price {
            font-size: 2rem;
            font-weight: 200;
            color: #00ffc8;
            line-height: 1;
        }

        .haiku-price small {
            font-size: 0.8rem;
            color: #666;
            margin-left: 0.2rem;
        }

        .haiku-note {
            color: #777;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
        }

        /* Estadísticas como nubes */
        .stats-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem;
            min-height: 100vh;
            align-items: center;
        }

        .cloud-item {
            background: rgba(20,20,20,0.3);
            backdrop-filter: blur(8px);
            border: 1px solid #333;
            border-radius: 200px 200px 200px 200px / 200px 200px 200px 200px;
            padding: 2rem 3rem;
            text-align: center;
            transition: 0.4s;
            animation: floatCloud 6s infinite alternate;
        }

        .cloud-item:nth-child(2) { animation-delay: 0.5s; }
        .cloud-item:nth-child(3) { animation-delay: 1s; }

        @keyframes floatCloud {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .cloud-item:hover {
            border-color: #00ffc8;
            transform: scale(1.05);
            background: rgba(0,255,200,0.1);
        }

        .cloud-emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .cloud-label {
            font-size: 1rem;
            color: #ccc;
            letter-spacing: 0.2em;
        }

        /* Elemento decorativo: líneas como hilos */
        .thread-line {
            position: fixed;
            top: 0;
            left: 10%;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .thread-line:nth-child(4) {
            left: 20%;
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(0,255,200,0.05), transparent);
        }

        .thread-line:nth-child(5) {
            left: 80%;
            width: 1px;
        }

        /* Responsive */
        @media (max-width: 800px) {
            .video-mask {
                width: 250px;
                height: 150px;
            }
            .haiku-card {
                flex-direction: column;
                border-radius: 40px;
                padding: 1.5rem;
            }
            .haiku-item {
                border-right: none;
                border-bottom: 1px dashed #333;
                padding: 1rem 0;
            }
            .haiku-item:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <!-- Líneas decorativas fijas -->
    <div class="thread-line"></div>
    <div class="thread-line"></div>
    <div class="thread-line"></div>

    <!-- Campo de partículas generado por JS -->
    <div class="particle-field" id="particle-field"></div>

    <!-- Kanji flotantes de fondo -->
    <div class="japanese-char" style="top: 20%; left: 5%;">零</div>
    <div class="japanese-char" style="bottom: 30%; right: 3%;">景</div>
    <div class="japanese-char" style="top: 70%; left: 15%;">静</div>

    <div class="scene">
        <!-- Zona de inicio -->
        <div class="header-zone">
            <h1 class="name">RELIGHTED</h1>
            <div class="kanji-sub">零 · アニメーター</div>
            <a href="https://discord.gg/x33ykcPqSY" class="discord-link" target="_blank">DISCORD</a>
            <p style="margin-top: 2rem; color: #777; font-weight: 200;">Roblox Studio Animator · R6 Specialist · Blender</p>
        </div>

        <!-- Collage de videos -->
        <div class="video-collage">
            <div class="video-mask">
                <iframe src="https://www.youtube.com/embed/TB9BlAUvUa8?modestbranding=1&rel=0&showinfo=0" allowfullscreen></iframe>
                <a href="https://youtu.be/TB9BlAUvUa8" target="_blank"></a>
                <span class="video-label">Two Gun Volley</span>
            </div>
            <div class="video-mask">
                <iframe src="https://www.youtube.com/embed/nlozlhtO_-E?modestbranding=1&rel=0&showinfo=0" allowfullscreen></iframe>
                <a href="https://youtu.be/nlozlhtO_-E" target="_blank"></a>
                <span class="video-label">Walk Anim</span>
            </div>
            <div class="video-mask">
                <iframe src="https://www.youtube.com/embed/3zpqruFkSgU?modestbranding=1&rel=0&showinfo=0" allowfullscreen></iframe>
                <a href="https://youtu.be/3zpqruFkSgU" target="_blank"></a>
                <span class="video-label">Half-Baked</span>
            </div>
        </div>

        <!-- Precios como haikus -->
        <div class="pricing-haiku">
            <div class="haiku-card">
                <div class="haiku-item">
                    <span class="haiku-desc">1 Rig R6</span>
                    <span class="haiku-price">500<small>R$</small></span>
                </div>
                <div class="haiku-item">
                    <span class="haiku-desc">2 Rigs R6</span>
                    <span class="haiku-price">625<small>R$</small></span>
                </div>
            </div>
            <div class="haiku-card">
                <div class="haiku-item">
                    <span class="haiku-desc">1 Rig Cutscene</span>
                    <span class="haiku-price">1000<small>R$</small></span>
                </div>
                <div class="haiku-item">
                    <span class="haiku-desc">2 Rigs Cutscene</span>
                    <span class="haiku-price">1250<small>R$</small></span>
                </div>
            </div>
            <div class="haiku-note">contact: xrelighted</div>
        </div>

        <!-- Nube de estadísticas -->
        <div class="stats-cloud">
            <div class="cloud-item">
                <div class="cloud-emoji">⚡</div>
                <div class="cloud-label">EFFICIENCY</div>
            </div>
            <div class="cloud-item">
                <div class="cloud-emoji">🔝</div>
                <div class="cloud-label">QUALITY</div>
            </div>
            <div class="cloud-item">
                <div class="cloud-emoji">💨</div>
                <div class="cloud-label">FAST</div>
            </div>
        </div>
    </div>

    <!-- Botón flotante minimalista (otro Discord) -->
    <a href="https://discord.gg/b79Gt3x4y2" target="_blank" style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border: 1px solid #00ffc8; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #00ffc8; font-size: 1.5rem; text-decoration: none; z-index: 100; transition: 0.3s; animation: pulseGlow 3s infinite;">💬</a>

    <style>
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0,255,200,0.3); }
            70% { box-shadow: 0 0 0 10px rgba(0,255,200,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,200,0); }
        }
    </style>

    <script>
        // Generar partículas sutiles
        const field = document.getElementById('particle-field');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.width = (Math.random() * 2 + 0.5) + 'px';
            p.style.height = p.style.width;
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 30 + 20) + 's';
            p.style.background = `rgba(0, 255, 200, ${Math.random() * 0.3})`;
            field.appendChild(p);
        }

        // Parallax suave para kanjis
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            document.querySelectorAll('.japanese-char').forEach((el, i) => {
                el.style.transform = `translateY(${scrollY * 0.03 * (i+1)}px)`;
            });
        });
    </script>
</body>
</html>
